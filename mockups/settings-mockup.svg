      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#16253B" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1440" height="900" rx="18" fill="#F5F6FB"/>
  <rect x="0" y="0" width="290" height="900" rx="18" fill="#F7F7FC"/>

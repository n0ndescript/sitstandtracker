  <text x="32" y="62" fill="#20242D" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="36" font-weight="700">Tracker</text>
  <text x="32" y="92" fill="#8A8F9C" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="20">Productive Session</text>
  <text x="72" y="171" fill="#5C6270" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="600">Dashboard</text>
  <text x="72" y="243" fill="#5C6270" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="600">History</text>
  <text x="72" y="295" fill="#5C6270" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="600">Analytics</text>
  <rect x="24" y="316" width="240" height="46" rx="12" fill="#FFFFFF"/>
  <text x="72" y="347" fill="#32C48D" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="700">Settings</text>
  <text x="356" y="72" fill="#20242D" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="42" font-weight="700">Settings</text>
  <text x="356" y="108" fill="#7A8190" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="20">Configure your preferred work cycle and the small number of behaviors that drive the app.</text>
  <g filter="url(#shadow)">
    <rect x="356" y="148" width="996" height="278" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="388" y="194" fill="#2A2F39" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Work Cycle</text>
  <text x="388" y="252" fill="#2E333C" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="22" font-weight="600">Stand for</text>
  <rect x="504" y="224" width="86" height="44" rx="10" fill="#FFFFFF" stroke="#D6DCE8"/>
  <text x="547" y="253" text-anchor="middle" fill="#6B7381" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">15</text>
  <text x="608" y="252" fill="#8B919D" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="22">minutes</text>
  <text x="388" y="324" fill="#2E333C" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="22" font-weight="600">after sitting for</text>
  <rect x="600" y="296" width="86" height="44" rx="10" fill="#FFFFFF" stroke="#D6DCE8"/>
  <text x="643" y="325" text-anchor="middle" fill="#6B7381" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">45</text>
  <text x="704" y="324" fill="#8B919D" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="22">minutes</text>
  <rect x="388" y="360" width="242" height="38" rx="19" fill="#EEF4FB"/>
  <text x="509" y="384" text-anchor="middle" fill="#48627D" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="17" font-weight="700">Derived target ratio: 1 stand / 3 sit</text>
  <g filter="url(#shadow)">
    <rect x="356" y="454" width="996" height="150" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="388" y="500" fill="#2A2F39" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">Alerts</text>
  <text x="388" y="552" fill="#2E333C" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="22" font-weight="600">Default snooze</text>
  <rect x="556" y="524" width="86" height="44" rx="10" fill="#FFFFFF" stroke="#D6DCE8"/>
  <text x="599" y="553" text-anchor="middle" fill="#6B7381" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">5</text>
  <text x="660" y="552" fill="#8B919D" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="22">minutes</text>
  <text x="388" y="586" fill="#7A8190" font-family="SF Pro Text, Helvetica, Arial, sans-serif" font-size="18">Screen lock always stops tracking temporarily and resumes the same posture on unlock.</text>
